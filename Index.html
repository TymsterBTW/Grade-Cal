<html>
  <head>
    <link rel="stylesheet" href="Style.css" />
    <script>
      var score = document.getElementById("score").value;
      var total = document.getElementById("total").value;
      var percentage = (score / total) * 100
      console.log(percentage)
      function func() {
        console.log(score)
        console.log(total )
        console.log(percentage)
      }
    </script>
    <body id="background">
      <div class="title"><b>Grade Calculator</b></div>
      <div class="inputs">
        <input type="text" placeholder="Input what you got" class="input" id="score">
        <input type="text" placeholder="Input what it was out of" class="input" id="total">
      </div>
      <button onclick="func();">Press me</button>
    </body>
  </head>
</html>
