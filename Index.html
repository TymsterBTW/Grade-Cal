<html>
  <head>
    <link rel="stylesheet" href="Style.css" />
    <script>
      function func() {
        var score = document.getElementById("score").value;
        var total = document.getElementById("total").value;
        // 1 is test 1
        //2 is unkown
        //3 is test 2

        var percentage = (score / total) * 100;
        console.log(score);
        console.log(total);
        console.log(percentage);  

      }
      function colorH() {
        document.getElementById("Higher").style.backgroundColor = '#26ed86';
        document.getElementById("Higher").style.border = 'none';
      }
      function colorF() {
        document.getElementById("Foundation").style.backgroundColor = '#26ed86';
        document.getElementById("Foundation").style.border = 'none';
        
      }
    </script>
    <body id="background">
      <div id="box">
        <div class="title"><b>Grade Calculator</b></div>
        <div class="inputs">
          <input
          type="text"
          placeholder="Input what you got"
          class="input"
          id="score"
        />
        <input
          type="text"
          placeholder="Input what it was out of"
          class="input"
          id="total"
        />
      </div>
      <div class="holding">
        <button type="button" class="button" id="Higher" onclick="colorH(); func(); ">HIGHER</button>
        <button class="button" id="Foundation" type="button" onclick="colorF(); func();">FOUNDATION</button>
      </div>




        </div>
      </div>
      
    </body>
  </head>
</html>
