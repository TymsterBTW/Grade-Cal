      function color(x, y){
        var color = document.getElementById(x);
        if (color.classList.contains("disabled")) {
          color.classList.remove("disabled");
          color.classList.add("enabled");
          document.getElementById(y).classList.remove("enabled");
          document.getElementById(y).classList.add("disabled");
        }
        else {
          color.classList.remove("enabled");
          color.classList.add("disabled");
        }
     }
     function colorcal() {
       var color = document.getElementById("calcu");
       color.classList.remove("disabled");
       color.classList.add("enabled");
       setTimeout(() => { color.classList.remove("enabled"); color.classList.add("disabled"); }, 800);
     }

     
     var testType = 0;

        }
